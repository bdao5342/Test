<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Knowledge Node Explorer</title><style>*,*::after,*::before{box-sizing:border-box;margin:0;padding:0}body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#000814;color:#e4e4e8;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:16px;position:relative;overflow:hidden}body::before{content:"";position:fixed;top:0;left:0;width:100%;height:100%;background:radial-gradient(2px 2px at 20px 30px,#eee,rgba(0,0,0,0)),radial-gradient(2px 2px at 60px 70px,#fff,rgba(0,0,0,0)),radial-gradient(1px 1px at 50px 50px,#ddd,rgba(0,0,0,0)),radial-gradient(1px 1px at 130px 80px,#fff,rgba(0,0,0,0)),radial-gradient(2px 2px at 90px 10px,#eee,rgba(0,0,0,0));background-repeat:repeat;background-size:200px 200px;background-color:#000814;animation:twinkle 3s ease-in-out infinite;pointer-events:none;z-index:0}body::after{content:"";position:fixed;top:0;left:0;width:100%;height:100%;background:radial-gradient(ellipse at 20% 50%,rgba(99,102,241,.1) 0,transparent 50%),radial-gradient(ellipse at 80% 80%,rgba(168,85,247,.1) 0,transparent 50%),radial-gradient(ellipse at 50% 0,rgba(59,130,246,.05) 0,transparent 50%);pointer-events:none;z-index:0}@keyframes twinkle{0%,100%{opacity:.3}50%{opacity:1}}header{padding:28px 24px 4px;text-align:center;position:relative;z-index:10}header h1{font-size:clamp(20px,5vw,28px);font-weight:500;letter-spacing:-.3px;color:#f0f0f4;text-shadow:0 0 20px rgba(99,102,241,.5)}header p{font-size:13px;color:#888;margin-top:4px}#canvas{position:relative;width:100%;max-width:720px;aspect-ratio:680 / 480;margin:12px 0;cursor:grab;user-select:none;z-index:5}#canvas.dragging{cursor:grabbing}svg#graph{width:100%;height:100%;transition:transform .6s cubic-bezier(.34,1.56,.64,1)}.node-group{cursor:pointer;transition:filter .2s ease}.node-group:focus{outline:0;filter:drop-shadow(0 0 12px rgba(127, 119, 221, .6))}.node-group:focus-visible{filter:drop-shadow(0 0 12px rgba(127, 119, 221, .8))}.node-group circle.pulse{transition:r .3s ease,opacity .3s ease}.node-group circle.body{transition:r .2s ease,filter .2s ease}.node-group ellipse.shine{transition:opacity .2s ease}.node-group:hover circle.body,.node-group:focus circle.body{r:calc(var(--r) + 4px);filter:brightness(1.15)}.node-group:hover circle.pulse,.node-group:focus circle.pulse{r:calc(var(--r) + 14px);opacity:.25}.node-group:hover ellipse.shine,.node-group:focus ellipse.shine{opacity:.5}#panel{position:absolute;bottom:12px;left:50%;transform:translateX(-50%) translateY(20px);width:92%;max-width:560px;background:rgba(15,15,25,.95);backdrop-filter:blur(10px);border:.5px solid #33
