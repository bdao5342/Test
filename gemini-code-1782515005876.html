<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CompTIA Security+ Study Guide</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #000411;
      color: #e4e4e8;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 16px;
      position: relative;
      overflow: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: 
        radial-gradient(2px 2px at 20px 30px, #eee, rgba(0,0,0,0)),
        radial-gradient(2px 2px at 60px 70px, #fff, rgba(0,0,0,0)),
        radial-gradient(1px 1px at 50px 50px, #ddd, rgba(0,0,0,0)),
        radial-gradient(1px 1px at 130px 80px, #fff, rgba(0,0,0,0));
      background-repeat: repeat;
      background-size: 200px 200px;
      animation: twinkle 3s ease-in-out infinite;
      pointer-events: none; z-index: 0;
    }

    body::after {
      content: "";
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: 
        radial-gradient(ellipse at 20% 50%, rgba(99, 102, 241, 0.08) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 80%, rgba(168, 85, 247, 0.08) 0%, transparent 50%);
      pointer-events: none; z-index: 0;
    }

    @keyframes twinkle { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }

    header { padding: 28px 24px 4px; text-align: center; position: relative; z-index: 10; }
    header h1 { font-size: clamp(20px, 5vw, 28px); font-weight: 500; letter-spacing: -0.3px; text-shadow: 0 0 20px rgba(99, 102, 241, 0.5); }
    header p { font-size: 13px; color: #888; margin-top: 4px; }

    #canvas { position: relative; width: 100%; max-width: 720px; aspect-ratio: 680 / 480; margin: 12px 0; cursor: grab; user-select: none; z-index: 5; }
    #canvas.dragging { cursor: grabbing; }
    svg#graph { width: 100%; height: 100%; transform-origin: 0 0; transition: transform 0.1s linear; }

    .node-group { cursor: pointer; transition: filter 0.2s ease; }
    .node-group:focus { outline: none; filter: drop-shadow(0 0 12px rgba(127, 119, 221, 0.6)); }
    
    .node-group:hover circle.body, .node-group:focus circle.body { r: calc(var(--r) + 4px); filter: brightness(1.2) drop-shadow(0 0 8px var(--glow)); }
    .node-group:hover circle.pulse, .node-group:focus circle.pulse { r: calc(var(--r) + 14px); opacity: 0.25; }
    .node-group:hover ellipse.shine, .node-group:focus ellipse.shine { opacity: 0.5; }

    .web-thread { transition: stroke-opacity 0.3s ease; }
    .node-group:hover ~ .web-thread { stroke-opacity: 0.4; }

    #panel {
      position: absolute; bottom: 12px; left: 50%; transform: translateX(-50%) translateY(20px);
      width: 92%; max-width: 560px; background: rgba(15, 15, 25, 0.95); backdrop-filter: blur(10px);
      border: 0.5px solid #333355; border-radius: 14px; padding: 18px 22px 16px;
      opacity: 0; visibility: hidden; transition: opacity 0.3s ease, visibility 0.3s ease, transform 0.3s ease;
      max-height: 60vh; overflow-y: auto; box-shadow: 0 8px 32px rgba(99, 102, 241, 0.2);
    }
    #panel.open { opacity: 1; visibility: visible; transform: translateX(-50%) translateY(0); }
    #panel h3 { font-size: 15px; font-weight: 500; color: #f0f0f4; margin-bottom: 6px; }
    #panel p { font-size: 13px; color: #999; line-height: 1.65; }

    #panel-close { position: absolute; top: 12px; right: 16px; cursor: pointer; font-size: 20px; color: #666; background: none; border: none; padding: 6px 8px; border-radius: 4px; }
    #panel-close:hover { color: #ddd; background: rgba(255, 255, 255, 0.1); }

    .panel-breadcrumb { font-size: 11px; color: #666; margin-bottom: 10px; display: flex; align-items: center; gap: 6px; }
    .panel-breadcrumb button { background: none; border: none; color: #7F77DD; cursor: pointer; text-decoration: underline; font-size: 11px; padding: 2px 4px; }

    .subnodes { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 12px; }
    .sub-btn { font-size: 12px; padding: 6px 12px; border-radius: 99px; border: 0.5px solid #333; background: #1a1a2e; color: #aaa; cursor: pointer; transition: all 0.15s ease; }
    .sub-btn:hover { background: #2a2a3e; color: #ddd; border-color: #555; transform: translateY(-1px); }

    #hint { font-size: 12px; color: #555; text-align: center; padding: 12px 0 2px; position: relative; z-index: 10; }
    @media (max-width: 640px) { #panel { width: 95%; padding: 16px; } }
    #panel::-webkit-scrollbar { width: 6px; }
    #panel::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }
  </style>
</head>
<body>

<header>
  <h1>CompTIA Security+ Study Guide (SY0-701)</h1>
  <p>Drag to pan • Use Mouse Wheel to Zoom • Click nodes to view security criteria</p>
</header>

<div id="canvas">
  <svg id="graph" viewBox="0 0 680 480" preserveAspectRatio="xMidYMid meet">
    <defs id="gradients"></defs>
    <g id="thread-layer"></g>
    <g id="node-layer"></g>
  </svg>
  <div id="panel" role="dialog" aria-modal="true" aria-labelledby="panel-title">
    <button id="panel-close" aria-label="Close panel">×</button>
    <div class="panel-breadcrumb" id="panel-breadcrumb" style="display: none;">
      <button id="breadcrumb-back">← Back</button>
      <span>/</span>
      <span id="breadcrumb-current"></span>
    </div>
    <h3 id="panel-title"></h3>
    <p id="panel-desc"></p>
    <div class="subnodes" id="panel-subs"></div>
  </div>
</div>

<p id="hint">Scroll Wheel: Zoom • Drag Left Click: Navigate Web Map</p>

<script>
  // ─── Repaired, Synced, and Completed Security+ Data Graph ───
  const topics = {
    center: {
      id: "center", label: "Security Domains",
      x: 340, y: 240, r: 40, color: "#7F77DD", textColor: "#fff",
      desc: "Core architectural boundaries of the CompTIA Security+ (SY0-701) certification exam matrix.",
      children: ["domain1", "domain2", "domain3", "domain4", "domain5"]
    },
    // Domain 1
    domain1: {
      id: "domain1", label: "General Security Concepts",
      x: 180, y: 120, r: 28, color: "#1D9E75", textColor: "#fff",
      desc: "Foundational rules, security terminology, basic mathematical primitives, and change models.",
      children: ["controls", "triad", "change_mgmt", "crypto"], parentId: "center"
    },
    controls: { id: "controls", label: "Security Controls", x: 90, y: 60, r: 16, color: "#167A5B", textColor: "#ccc", desc: "Technical, administrative, and physical measures enforcing security.", parentId: "domain1", subs: ["Managerial (Policies)", "Operational (Training)", "Technical (Firewalls)", "Physical (Locks)"] },
    triad: { id: "triad", label: "CIA Triad", x: 190, y: 30, r: 16, color: "#167A5B", textColor: "#ccc", desc: "The foundational benchmark model guiding network defense design schemas.", parentId: "domain1", subs: ["Confidentiality (Encryption)", "Integrity (Hashing/Salts)", "Availability (RAID/Backups)"] },
    change_mgmt: { id: "change_mgmt", label: "Change Management", x: 270, y: 50, r: 16, color: "#167A5B", textColor: "#ccc", desc: "Structured deployment systems to modify asset operations safely.", parentId: "domain1", subs: ["Approval Boards (CAB)", "Rollback Configuration", "Impact Evaluation"] },
    crypto: { id: "crypto", label: "Cryptographic Solutions", x: 110, y: 180, r: 16, color: "#167A5B", textColor: "#ccc", desc: "Mathematical ciphers maintaining algorithmic privacy and system integrity.", parentId: "domain1", subs: ["Symmetric (AES)", "Asymmetric (RSA/ECC)", "Public Key Infrastructure (PKI)"] },

    // Domain 2
    domain2: {
      id: "domain2", label: "Threats & Vulnerabilities",
      x: 500, y: 120, r: 28, color: "#378ADD", textColor: "#fff",
      desc: "Analyzing attack vectors, systems weaknesses, indicators of compromise, and threat agents.",
      children: ["vectors", "vuln_types", "ioc", "mitigation"], parentId: "center"
    },
    vectors: { id: "vectors", label: "Attack Surfaces", x: 410, y: 50, r: 16, color: "#2B6CAE", textColor: "#ccc", desc: "All network path vectors exposed to unauthenticated malicious insertion attempts.", parentId: "domain2", subs: ["Supply Chain Vectors", "Social Engineering", "Wireless/RF Injection"] },
    vuln_types: { id: "vuln_types", label: "Vulnerability Types", x: 490, y: 30, r: 16, color: "#2B6CAE", textColor: "#ccc", desc: "Architectural flaws existing in configuration layouts, hardware, or code stacks.", parentId: "domain2", subs: ["Zero-Day Flaws", "Misconfigurations", "Memory Injections (Buffer Overflow)"] },
    ioc: { id: "ioc", label: "Compromise Indicators", x: 590, y: 60, r: 16, color: "#2B6CAE", textColor: "#ccc", desc: "Forensic evidence patterns signifying network breach occurrences.", parentId: "domain2", subs: ["Exorbitant Data Exfiltration", "Spike in Unauth Port Swaps", "MD5 Hash Mismatches"] },
    mitigation: { id: "mitigation", label: "Mitigation Tactics", x: 570, y: 180, r: 16, color: "#2B6CAE", textColor: "#ccc", desc: "Proactive mechanisms deployable to isolate surfaces and stop threat vectors.", parentId: "domain2", subs: ["Air Gapping", "Host-based Firewalls", "Signature Updates"] },

    // Domain 3
    domain3: {
      id: "domain3", label: "Security Architecture",
      x: 130, y: 340, r: 28, color: "#D4537E", textColor: "#fff",
      desc: "Infrastructure design blueprints, zero-trust topologies, environment segmentation, and resiliency systems.",
      children: ["arch_models", "secure_infra", "data_class", "resiliency"], parentId: "center"
    },
    arch_models: { id: "arch_models", label: "Architecture Models", x: 50, y: 380, r: 16, color: "#B04467", textColor: "#ccc", desc: "Framework architectures ensuring consistent data lifecycle controls.", parentId: "domain3", subs: ["Zero Trust Architecture", "Cloud (IaaS/PaaS/SaaS)", "Edge Computing Security"] },
    secure_infra: { id: "secure_infra", label: "Secure Infrastructure", x: 150, y: 440, r: 16, color: "#B04467", textColor: "#ccc", desc: "Physical and programmatic fortification of core hardware appliances.", parentId: "domain3", subs: ["Hardware Root of Trust (TPM)", "Secure Boot Enforcement", "SED (Self-Encrypting Drives)"] },
    data_class: { id: "data_class", label: "Data Classification", x: 220, y: 390, r: 16, color: "#B04467", textColor: "#ccc", desc: "Categorization profiles limiting distribution based on sensitivity rules.", parentId: "domain3", subs: ["Regulated (PII/PHI)", "Intellectual Property", "Data Minimization Processes"] },
    resiliency: { id: "resiliency", label: "System Resiliency", x: 60, y: 260, r: 16, color: "#B04467", textColor: "#ccc", desc: "High-availability design configurations engineered to withstand severe downtime.", parentId: "domain3", subs: ["Redundancy (RAID/Geodistribution)", "Backups (Incremental/Differential)", "Hot/Warm/Cold Sites"] },

    // Domain 4
    domain4: {
      id: "domain4", label: "Security Operations",
      x: 550, y: 340, r: 28, color: "#BA7517", textColor: "#fff",
      desc: "Day-to-day active configuration handling, vulnerability telemetry, logging matrices, and monitoring routines.",
      children: ["asset_mgmt", "vuln_scanning", "monitoring", "iam"], parentId: "center"
    },
    asset_mgmt: { id: "asset_mgmt", label: "Asset Management", x: 460, y: 390, r: 16, color: "#996013", textColor: "#ccc", desc: "Proactive catalog tracking of all authorized processing hosts and nodes.", parentId: "domain4", subs: ["Automated Network Discovery", "Decommissioning Lifecycles", "MDM Profiling"] },
    vuln_scanning: { id: "vuln_scanning", label: "Vulnerability Probes", x: 530, y: 440, r: 16, color: "#996013", textColor: "#ccc", desc: "Configured assessments seeking structural flaws across system maps.", parentId: "domain4", subs: ["Credentialed vs Non-Credentialed", "False Positive Management", "SCAP Auditing Engine"] },
    monitoring: { id: "monitoring", label: "Security Monitoring", x: 630, y: 380, r: 16, color: "#996013", textColor: "#ccc", desc: "Real-time auditing engines sorting through environment transaction flows.", parentId: "domain4", subs: ["SIEM Log Analysis", "SOAR Automation Triggers", "User Behavior Analytics (UBA)"] },
    iam: { id: "iam", label: "Identity & Access (IAM)", x: 620, y: 260, r: 16, color: "#996013", textColor: "#ccc", desc: "Authentication schemas managing verification controls across asset layers.", parentId: "domain4", subs: ["Multi-Factor Auth (MFA)", "Federated Identity (SAML/OAuth)", "Least Privilege Enforcement"] },

    // Domain 5
    domain5: {
      id: "domain5", label: "Program Management",
      x: 340, y: 420, r: 28, color: "#993556", textColor: "#fff",
      desc: "Risk engineering management frameworks, external regulatory compliance baselines, and awareness routines.",
      children: ["procedures", "risk_mgmt", "compliance", "awareness"], parentId: "center"
    },
    procedures: { id: "procedures", label: "Security Procedures", x: 340, y: 475, r: 16, color: "#7F2C47", textColor: "#ccc", desc: "Governing directives mapping required response steps across operational teams.", parentId: "domain5", subs: ["Incident Response Lifecycles", "Business Impact Analysis (BIA)", "Disaster Recovery Testing"] },
    risk_mgmt: { id: "risk_mgmt", label: "Risk Management", x: 410, y: 460, r: 16, color: "#7F2C47", textColor: "#ccc", desc: "The classification loop identifying, tracking, and offsetting business threats.", parentId: "domain5", subs: ["Risk Assessment (SLE/ALE/ARO)", "Mitigate vs Transmit vs Accept", "Business Impact Analysis"] },
    compliance: { id: "compliance", label: "Compliance & Regulations", x: 270, y: 460, r: 16, color: "#7F2C47", textColor: "#ccc", desc: "Statutory mandates checking that operations maintain rigid data protections.", parentId: "domain5", subs: ["Regulatory Frameworks (GDPR/HIPAA)", "Payment Card Rules (PCI-DSS)", "Auditing Frameworks (SOC2)"] },
    awareness: { id: "awareness", label: "Awareness Systems", x: 340, y: 355, r: 16, color: "#7F2C47", textColor: "#ccc", desc: "Educational human strategies designed to neutralize behavioral vectors.", parentId: "domain5", subs: ["Phishing Mock Campaigns", "Social Engineering Drills", "Insider Threat Profiles"] }
  };

  const svg = document.getElementById("graph");
  const threadLayer = document.getElementById("thread-layer");
  const nodeLayer = document.getElementById("node-layer");
  const gradientsDef = document.getElementById("gradients");
  const NS = "http://www.w3.org/2000/svg";

  let scale = 2.0, currentTranslate = { x: -340, y: -240 };
  let isDragging = false, dragStartX = 0, dragStartY = 0, isAnimating = false, panelHistory = [];

  function el(tag, attrs) {
    const e = document.createElementNS(NS, tag);
    for (const [k, v] of Object.entries(attrs)) e.setAttribute(k, v);
    return e;
  }

  // ─── Cleaned Dynamic Drawing Pipeline ───
  function drawGraph() {
    // Generate lines and curve structures dynamically from structural properties
    Object.values(topics).forEach(node => {
      if (node.parentId) {
        const parent = topics[node.parentId];
        // Draw Radial Web Spoke
        threadLayer.appendChild(el("line", {
          x1: parent.x, y1: parent.y, x2: node.x, y2: node.y,
          stroke: node.color, "stroke-width": parent.id === 'center' ? "1.5" : "1.2",
          "stroke-opacity": "0.35", "stroke-dasharray": "4 3"
        }));
      }
    });

    // Draw Curved Concentric Inner Web Ring
    const mainTiers = topics.center.children;
    for (let i = 0; i < mainTiers.length; i++) {
      drawCurve(topics[mainTiers[i]], topics[mainTiers[(i + 1) % mainTiers.length]], "0.18");
    }

    // Draw Curved Concentric Outer Web Ring
    const outerSequence = [
      "controls", "triad", "change_mgmt", "crypto", "vectors", "vuln_types", 
      "ioc", "mitigation", "iam", "monitoring", "vuln_scanning", "asset_mgmt", 
      "risk_mgmt", "procedures", "compliance", "awareness", "resiliency", "data_class", "secure_infra", "arch_models"
    ];
    for (let i = 0; i < outerSequence.length; i++) {
      const current = topics[outerSequence[i]];
      const next = topics[outerSequence[(i + 1) % outerSequence.length]];
      if (current && next) drawCurve(current, next, "0.12");
    }
  }

  function drawCurve(n1, n2, opacity) {
    const midX = (n1.x + n2.x) / 2, midY = (n1.y + n2.y) / 2;
    const cpx = midX + (340 - midX) * 0.15, cpy = midY + (240 - midY) * 0.15;
    threadLayer.appendChild(el("path", {
      class: "web-thread", d: `M ${n1.x} ${n1.y} Q ${cpx} ${cpy} ${n2.x} ${n2.y}`,
      fill: "none", stroke: "#ffffff", "stroke-width": "1", "stroke-opacity": opacity
    }));
  }

  function drawNodes() {
    Object.values(topics).forEach(node => {
      // Inline radial gradient injection setup
      const grad = el("radialGradient", { id: `sphere-${node.id}`, cx: "35%", cy: "35%" });
      grad.appendChild(el("stop", { offset: "0%", "stop-color": node.color }));
      grad.appendChild(el("stop", { offset: "100%", "stop-color": node.color, "stop-opacity": "0.6" }));
      gradientsDef.appendChild(grad);

      const g = el("g", { class: "node-group", role: "button", tabindex: "0", "aria-label": node.label, style: `--glow: ${node.color};` });
      g.appendChild(el("circle", { class: "pulse", cx: node.x, cy: node.y, r: node.r + 10, fill: node.color, opacity: "0.12" }));
      g.appendChild(el("circle", { class: "body", cx: node.x, cy: node.y, r: node.r, fill: `url(#sphere-${node.id})`, style: `--r: ${node.r}px;` }));
      g.appendChild(el("ellipse", { class: "shine", cx: node.x - node.r * 0.3, cy: node.y - node.r * 0.3, rx: node.r * 0.4, ry: node.r * 0.5, fill: "white", opacity: "0.25" }));

      // Process Clean Multi-line label stacking
      const words = node.label.split(" "), lineH = 12, startY = node.y - ((words.length - 1) * lineH) / 2;
      words.forEach((word, idx) => {
        const text = el("text", { x: node.x, y: startY + idx * lineH, "text-anchor": "middle", "dominant-baseline": "central", fill: node.textColor, "pointer-events": "none", "font-size": node.id === "center" ? "13" : (node.children ? "11" : "9"), "font-weight": "500", "text-shadow": "0 1px 3px rgba(0,0,0,0.9)" });
        text.textContent = word;
        g.appendChild(text);
      });

      const clickAction = () => { zoomToNode(node); showPanel(node); };
      g.addEventListener("click", clickAction);
      g.addEventListener("keydown", e => { if (e.key === "Enter" || e.key === " ") { e.preventDefault(); clickAction(); } });
      nodeLayer.appendChild(g);
    });
  }

  // ─── Unified Camera Transform Engine ───
  function applyTransform() { svg.style.transform = `translate(${currentTranslate.x}px, ${currentTranslate.y}px) scale(${scale})`; }

  canvas.addEventListener("wheel", e => {
    e.preventDefault();
    const rect = canvas.getBoundingClientRect(), mx = e.clientX - rect.left, my = e.clientY - rect.top;
    const gx = (mx - currentTranslate.x) / scale, gy = (my - currentTranslate.y) / scale;
    scale = e.deltaY < 0 ? Math.min(scale + 0.05, 4.5) : Math.max(scale - 0.05, 0.6);
    currentTranslate.x = mx - gx * scale; currentTranslate.y = my - gy * scale;
    svg.style.transition = "none"; applyTransform();
  }, { passive: false });

  svg.addEventListener("mousedown", e => {
    if (e.target.closest(".node-group")) return;
    isDragging = true; canvas.classList.add("dragging"); svg.style.transition = "none";
    dragStartX = e.clientX - currentTranslate.x; dragStartY = e.clientY - currentTranslate.y;
  });
  document.addEventListener("mousemove", e => { if (isDragging) { currentTranslate.x = e.clientX - dragStartX; currentTranslate.y = e.clientY - dragStartY; applyTransform(); } });
  document.addEventListener("mouseup", () => { isDragging = false; canvas.classList.remove("dragging"); });

  function zoomToNode(node) {
    if (isAnimating) return; isAnimating = true;
    scale = node.id === "center" ? 1.5 : 2.5;
    currentTranslate.x = 340 - (node.x * scale); currentTranslate.y = 240 - (node.y * scale);
    svg.style.transition = "transform 0.6s cubic-bezier(0.34, 1.56, 0.64, 1)"; applyTransform();
    setTimeout(() => { isAnimating = false; }, 600);
  }

  function resetZoom() {
    if (isAnimating) return; isAnimating = true;
    scale = 2.0; currentTranslate = { x: -340, y: -240 };
    svg.style.transition = "transform 0.6s cubic-bezier(0.34, 1.56, 0.64, 1)"; applyTransform();
    setTimeout(() => { isAnimating = false; }, 600);
  }

  // ─── Cleaned Panel UI Operations ───
  function showPanel(node) {
    panelHistory.push(node);
    document.getElementById("panel-title").textContent = node.label;
    document.getElementById("panel-desc").textContent = node.desc;

    const bcrumb = document.getElementById("panel-breadcrumb");
    if (panelHistory.length > 1) {
      bcrumb.style.display = "flex";
      document.getElementById("breadcrumb-current").textContent = node.label;
      document.getElementById("breadcrumb-back").onclick = () => goBack();
    } else bcrumb.style.display = "none";

    const subsEl = document.getElementById("panel-subs"); subsEl.innerHTML = "";

    (node.subs || []).forEach(text => {
      const b = document.createElement("button"); b.className = "sub-btn"; b.textContent = "🛡️ " + text;
      subsEl.appendChild(b);
    });

    (node.children || []).forEach(cid => {
      const child = topics[cid];
      if (child) {
        const b = document.createElement("button"); b.className = "sub-btn"; b.style.borderColor = child.color; b.textContent = "🕸️ " + child.label;
        b.onclick = () => { zoomToNode(child); showPanel(child); };
        subsEl.appendChild(b);
      }
    });

    if (!node.children && node.parentId) {
      const pNode = topics[node.parentId];
      const b = document.createElement("button"); b.className = "sub-btn"; b.textContent = "↑ Up to " + pNode.label;
      b.onclick = () => { zoomToNode(pNode); showPanel(pNode); };
      subsEl.appendChild(b);
    }
    document.getElementById("panel").classList.add("open");
  }

  function goBack() { panelHistory.pop(); if (panelHistory.length > 0) { const p = panelHistory.pop(); zoomToNode(p); showPanel(p); } else closePanel(); }
  function closePanel() { document.getElementById("panel").classList.remove("open"); panelHistory = []; resetZoom(); }
  document.getElementById("panel-close").addEventListener("click", closePanel);
  document.addEventListener("keydown", e => { if (e.key === "Escape") closePanel(); });

  // ─── Boot Run ───
  drawGraph(); drawNodes(); applyTransform();
</script>
</body>
</html>
