<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Knowledge Node Explorer - Infinite Web Edition</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #000411;
      color: #e4e4e8;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 16px;
      position: relative;
      overflow: hidden;
    }

    /* Space background with stars */
    body::before {
      content: "";
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: 
        radial-gradient(2px 2px at 20px 30px, #eee, rgba(0,0,0,0)),
        radial-gradient(2px 2px at 60px 70px, #fff, rgba(0,0,0,0)),
        radial-gradient(1px 1px at 50px 50px, #ddd, rgba(0,0,0,0)),
        radial-gradient(1px 1px at 130px 80px, #fff, rgba(0,0,0,0)),
        radial-gradient(2px 2px at 90px 10px, #eee, rgba(0,0,0,0));
      background-repeat: repeat;
      background-size: 200px 200px;
      background-color: #000411;
      animation: twinkle 3s ease-in-out infinite;
      pointer-events: none;
      z-index: 0;
    }

    /* Nebula effect */
    body::after {
      content: "";
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: 
        radial-gradient(ellipse at 20% 50%, rgba(99, 102, 241, 0.08) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 80%, rgba(168, 85, 247, 0.08) 0%, transparent 50%),
        radial-gradient(ellipse at 50% 0%, rgba(59, 130, 246, 0.05) 0%, transparent 50%);
      pointer-events: none;
      z-index: 0;
    }

    @keyframes twinkle {
      0%, 100% { opacity: 0.3; }
      50% { opacity: 1; }
    }

    header {
      padding: 28px 24px 4px;
      text-align: center;
      position: relative;
      z-index: 10;
    }

    header h1 {
      font-size: clamp(20px, 5vw, 28px);
      font-weight: 500;
      letter-spacing: -0.3px;
      color: #f0f0f4;
      text-shadow: 0 0 20px rgba(99, 102, 241, 0.5);
    }

    header p {
      font-size: 13px;
      color: #888;
      margin-top: 4px;
    }

    #canvas {
      position: relative;
      width: 100%;
      max-width: 720px;
      aspect-ratio: 680 / 480;
      margin: 12px 0;
      cursor: grab;
      user-select: none;
      z-index: 5;
    }

    #canvas.dragging {
      cursor: grabbing;
    }

    svg#graph {
      width: 100%;
      height: 100%;
      transform-origin: 0 0; /* Changed to 0 0 for precise cursor tracking zoom */
      transition: transform 0.1s linear; /* Shortened to make wheel scrolling perfectly interactive */
    }

    /* ─── Node Styles ─── */
    .node-group {
      cursor: pointer;
      transition: filter 0.2s ease;
    }

    .node-group:focus {
      outline: none;
      filter: drop-shadow(0 0 12px rgba(127, 119, 221, 0.6));
    }

    .node-group:focus-visible {
      filter: drop-shadow(0 0 12px rgba(127, 119, 221, 0.8));
    }

    .node-group circle.pulse {
      transition: r 0.3s ease, opacity 0.3s ease;
    }

    .node-group circle.body {
      transition: r 0.2s ease, filter 0.2s ease;
    }

    .node-group ellipse.shine {
      transition: opacity 0.2s ease;
    }

    .node-group:hover circle.body,
    .node-group:focus circle.body {
      r: calc(var(--r) + 4px);
      filter: brightness(1.2) drop-shadow(0 0 8px var(--glow));
    }

    .node-group:hover circle.pulse,
    .node-group:focus circle.pulse {
      r: calc(var(--r) + 14px);
      opacity: 0.25;
    }

    .node-group:hover ellipse.shine,
    .node-group:focus ellipse.shine {
      opacity: 0.5;
    }

    .web-thread {
      transition: stroke-opacity 0.3s ease, stroke-width 0.3s ease;
    }
    .node-group:hover ~ .web-thread {
      stroke-opacity: 0.4;
    }

    /* ─── Panel Styles ─── */
    #panel {
      position: absolute;
      bottom: 12px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      width: 92%;
      max-width: 560px;
      background: rgba(15, 15, 25, 0.95);
      backdrop-filter: blur(10px);
      border: 0.5px solid #333355;
      border-radius: 14px;
      padding: 18px 22px 16px;
      opacity: 0;
      visibility: hidden;
      transition: opacity 0.3s ease, visibility 0.3s ease, transform 0.3s ease;
      max-height: 60vh;
      overflow-y: auto;
      box-shadow: 0 8px 32px rgba(99, 102, 241, 0.2);
    }

    #panel.open {
      opacity: 1;
      visibility: visible;
      transform: translateX(-50%) translateY(0);
    }

    #panel h3 {
      font-size: 15px;
      font-weight: 500;
      color: #f0f0f4;
      margin-bottom: 6px;
    }

    #panel p {
      font-size: 13px;
      color: #999;
      line-height: 1.65;
    }

    #panel-close {
      position: absolute;
      top: 12px;
      right: 16px;
      cursor: pointer;
      font-size: 20px;
      color: #666;
      background: none;
      border: none;
      line-height: 1;
      font-family: inherit;
      padding: 6px 8px;
      transition: color 0.2s ease, background 0.2s ease, border-radius 0.2s ease;
      border-radius: 4px;
    }

    #panel-close:hover,
    #panel-close:focus {
      color: #ddd;
      background: rgba(255, 255, 255, 0.1);
    }

    #panel-close:focus {
      outline: 2px solid #7F77DD;
      outline-offset: 2px;
    }

    .panel-breadcrumb {
      font-size: 11px;
      color: #666;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .panel-breadcrumb button {
      background: none;
      border: none;
      color: #7F77DD;
      cursor: pointer;
      text-decoration: underline;
      font-size: 11px;
      padding: 2px 4px;
      transition: color 0.2s ease;
    }

    .panel-breadcrumb button:hover {
      color: #9d95ff;
    }

    /* ─── Subtopic Buttons ─── */
    .subnodes {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 12px;
    }

    .sub-btn {
      font-size: 12px;
      padding: 6px 12px;
      border-radius: 99px;
      border: 0.5px solid #333;
      background: #1a1a2e;
      color: #aaa;
      cursor: pointer;
      font-family: inherit;
      transition: background 0.15s, color 0.15s, border-color 0.15s, transform 0.1s ease;
    }

    .sub-btn:hover {
      background: #2a2a3e;
      color: #ddd;
      border-color: #555;
      transform: translateY(-1px);
    }

    .sub-btn:focus {
      outline: 2px solid #7F77DD;
      outline-offset: 2px;
    }

    .sub-btn:active {
      transform: translateY(0);
    }

    #hint {
      font-size: 12px;
      color: #555;
      text-align: center;
      padding: 12px 0 2px;
      animation: fadeIn 0.6s ease 0.3s both;
      position: relative;
      z-index: 10;
    }

    @media (max-width: 640px) {
      body { padding: 12px; }
      header { padding: 20px 16px 0; }
      header h1 { font-size: 20px; }
      #canvas { margin: 8px 0; }
      #panel { width: 95%; padding: 16px 16px 14px; font-size: 12px; }
      #panel h3 { font-size: 14px; }
    }

    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

    :focus-visible { outline: 2px solid #7F77DD; outline-offset: 2px; }

    #panel::-webkit-scrollbar { width: 6px; }
    #panel::-webkit-scrollbar-track { background: transparent; }
    #panel::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }
    #panel::-webkit-scrollbar-thumb:hover { background: #555; }
  </style>
</head>
<body>

<header>
  <h1>Knowledge Web Explorer</h1>
  <p>Drag to pan • Use Mouse Wheel to Zoom • Click nodes to view</p>
</header>

<div id="canvas">
  <svg id="graph" viewBox="0 0 680 480" preserveAspectRatio="xMidYMid meet" aria-label="Interactive knowledge web graph">
    <defs id="gradients"></defs>
    <g id="thread-layer"></g>
    <g id="node-layer"></g>
  </svg>
  <div id="panel" role="dialog" aria-modal="true" aria-labelledby="panel-title">
    <button id="panel-close" aria-label="Close panel">×</button>
    <div class="panel-breadcrumb" id="panel-breadcrumb" style="display: none;">
      <button id="breadcrumb-back">← Back</button>
      <span>/</span>
      <span id="breadcrumb-current"></span>
    </div>
    <h3 id="panel-title"></h3>
    <p id="panel-desc"></p>
    <div class="subnodes" id="panel-subs"></div>
  </div>
</div>

<p id="hint">Scroll Wheel: Zoom • Drag Left Click: Travel</p>

<script>
  const topics = {
    center: {
      id: "center", label: "Knowledge",
      x: 340, y: 240, r: 42, color: "#7F77DD", textColor: "#fff",
      desc: "Explore the branches of human knowledge. Click any connected node to dive in.",
      children: ["science", "tech", "history", "math", "arts"]
    },
    science: {
      id: "science", label: "Science",
      x: 180, y: 110, r: 32, color: "#1D9E75", textColor: "#fff",
      desc: "Science is the systematic study of the natural world through observation and experiment — spanning physics, chemistry, biology, and earth science.",
      children: ["physics", "chemistry", "biology", "astronomy"]
    },
    tech: {
      id: "tech", label: "Technology",
      x: 500, y: 110, r: 32, color: "#378ADD", textColor: "#fff",
      desc: "Technology encompasses the tools and systems humans create to solve problems — from ancient fire to modern AI and software.",
      children: ["ai_ml", "web_dev", "robotics", "biotech"]
    },
    arts: {
      id: "arts", label: "Arts",
      x: 130, y: 340, r: 32, color: "#D4537E", textColor: "#fff",
      desc: "The arts encompass creative disciplines like painting, music, literature, film, dance, and architecture that express human experience and emotion.",
      children: ["music", "visual_art", "literature", "film"]
    },
    history: {
      id: "history", label: "History",
      x: 550, y: 340, r: 32, color: "#BA7517", textColor: "#fff",
      desc: "History is the study of past events, civilizations, and human decisions — helping us understand how the present came to be.",
      children: ["ancient", "medieval", "modern", "world_wars"]
    },
    math: {
      id: "math", label: "Math",
      x: 340, y: 420, r: 32, color: "#993556", textColor: "#fff",
      desc: "Mathematics is the language of logic and structure — from counting and algebra to calculus, statistics, and abstract proofs.",
      children: ["algebra", "calculus", "statistics", "geometry"]
    },

    physics: { id: "physics", label: "Physics", x: 90, y: 60, r: 18, color: "#167A5B", textColor: "#ccc", desc: "The fundamental study of matter, energy, and the mechanics of spacetime.", parentId: "science", subs: ["Quantum Mechanics", "Relativity", "Thermodynamics"] },
    chemistry: { id: "chemistry", label: "Chemistry", x: 190, y: 30, r: 18, color: "#167A5B", textColor: "#ccc", desc: "The analysis of atomic components, molecular synthesis, and structural substances.", parentId: "science", subs: ["Organic Chemistry", "Biochemistry", "Physical Chemistry"] },
    biology: { id: "biology", label: "Biology", x: 270, y: 50, r: 18, color: "#167A5B", textColor: "#ccc", desc: "The exploration of living systems, cellular physiology, and macro-evolution.", parentId: "science", subs: ["Genetics", "Microbiology", "Ecology"] },
    astronomy: { id: "astronomy", label: "Astronomy", x: 110, y: 180, r: 18, color: "#167A5B", textColor: "#ccc", desc: "Observation of outer stellar structures, celestial tracking, and cosmological origins.", parentId: "science", subs: ["Astrophysics", "Exoplanets", "Cosmology"] },

    ai_ml: { id: "ai_ml", label: "AI & ML", x: 410, y: 50, r: 18, color: "#2B6CAE", textColor: "#ccc", desc: "Algorithmic engineering designed to simulate parsing patterns and computational intelligence.", parentId: "tech", subs: ["Neural Networks", "NLP", "Computer Vision"] },
    web_dev: { id: "web_dev", label: "Web Dev", x: 490, y: 30, r: 18, color: "#2B6CAE", textColor: "#ccc", desc: "The implementation of global networks, database engines, and responsive document structures.", parentId: "tech", subs: ["Frontend Architectures", "Backend APIs", "Security Platforms"] },
    robotics: { id: "robotics", label: "Robotics", x: 590, y: 60, r: 18, color: "#2B6CAE", textColor: "#ccc", desc: "The intersection of mechanical kinetics, sensor instrumentation, and automated systems.", parentId: "tech", subs: ["Kinematics", "Automation Control", "Computer Vision"] },
    biotech: { id: "biotech", label: "Biotech", x: 570, y: 180, r: 18, color: "#2B6CAE", textColor: "#ccc", desc: "Engineering live tissue mechanics and microbiological systems to formulate medical innovations.", parentId: "tech", subs: ["CRISPR & Gene Editing", "Bioinformatics", "Pharmaceuticals"] },

    ancient: { id: "ancient", label: "Ancient", x: 620, y: 260, r: 18, color: "#996013", textColor: "#ccc", desc: "Tracing early human settlements, original scripts, and classical old-world empires.", parentId: "history", subs: ["Mesopotamia", "Roman Empire", "Archaeology"] },
    medieval: { id: "medieval", label: "Medieval", x: 630, y: 380, r: 18, color: "#996013", textColor: "#ccc", desc: "Analysis of feudal systems, migratory conflicts, and global exchange transformations.", parentId: "history", subs: ["Feudalism", "The Crusades", "Renaissance Transitions"] },
    modern: { id: "modern", label: "Modern", x: 530, y: 440, r: 18, color: "#996013", textColor: "#ccc", desc: "Post-industrial history, political changes, and technological globalization.", parentId: "history", subs: ["Industrial Revolution", "Cold War Era", "Digital Age Transitions"] },
    world_wars: { id: "world_wars", label: "World Wars", x: 460, y: 390, r: 18, color: "#996013", textColor: "#ccc", desc: "Geopolitical analysis of the early-to-mid 20th century conflicts.", parentId: "history", subs: ["WWI Strategy", "WWII Geopolitics", "League of Nations"] },

    algebra: { id: "algebra", label: "Algebra", x: 410, y: 460, r: 18, color: "#7F2C47", textColor: "#ccc", desc: "The operational rules governing mathematical symbols and system expressions.", parentId: "math", subs: ["Linear Vector Spaces", "Abstract Group Rings", "Matrix Calculations"] },
    calculus: { id: "calculus", label: "Calculus", x: 340, y: 475, r: 18, color: "#7F2C47", textColor: "#ccc", desc: "The dynamic logic analyzing infinite change differentials and area integrals.", parentId: "math", subs: ["Differential Derivatives", "Integral Formulas", "Vector Fields"] },
    statistics: { id: "statistics", label: "Statistics", x: 270, y: 460, r: 18, color: "#7F2C47", textColor: "#ccc", desc: "Data aggregation laws, sampling analysis, and stochastic evaluation rules.", parentId: "math", subs: ["Probability Modeling", "Regression Curves", "Data Distribution"] },
    geometry: { id: "geometry", label: "Geometry", x: 340, y: 350, r: 18, color: "#7F2C47", textColor: "#ccc", desc: "Spatial dimensional analysis mapping shape components, line trajectories, and vectors.", parentId: "math", subs: ["Euclidean Rules", "Topology Properties", "Trigonometric Form"] },

    music: { id: "music", label: "Music", x: 220, y: 390, r: 18, color: "#B04467", textColor: "#ccc", desc: "Acoustic design tracking frequency, orchestration timelines, and sonic resonance patterns.", parentId: "arts", subs: ["Music Theory Mechanics", "Composition Form", "Acoustic Tuning"] },
    visual_art: { id: "visual_art", label: "Visual Art", x: 150, y: 440, r: 18, color: "#B04467", textColor: "#ccc", desc: "The evolution of spatial perspective mediums, painting styles, and structural sculpture formats.", parentId: "arts", subs: ["Art History Movements", "Perspective Laws", "Color Theory Geometry"] },
    literature: { id: "literature", label: "Literature", x: 50, y: 380, r: 18, color: "#B04467", textColor: "#ccc", desc: "The structure of lexical syntax, narrative plot dynamics, and epic texts.", parentId: "arts", subs: ["Narrative Prose Structure", "Poetry Analysis", "Comparative Myth"] },
    film: { id: "film", label: "Film", x: 60, y: 260, r: 18, color: "#B04467", textColor: "#ccc", desc: "Visual cinematic curation merging frame composition, auditory tracking, and time assembly.", parentId: "arts", subs: ["Cinematography Physics", "Montage Editing Theory", "Screenplay Blueprinting"] }
  };

  const svg = document.getElementById("graph");
  const threadLayer = document.getElementById("thread-layer");
  const nodeLayer = document.getElementById("node-layer");
  const gradientsDef = document.getElementById("gradients");
  const NS = "http://www.w3.org/2000/svg";

  // ─── UNIFIED CAMERA MATRIX STATE ───
  // Default scale updated to 2.0 (Double magnification)
  let scale = 2.0; 
  let currentTranslate = { x: -340, y: -240 }; // Perfect balance tracking to place hub center at 2.0 scale
  let isDragging = false, dragStartX = 0, dragStartY = 0;
  let isAnimating = false;
  let panelHistory = [];

  function el(tag, attrs) {
    const e = document.createElementNS(NS, tag);
    for (const [k, v] of Object.entries(attrs)) e.setAttribute(k, v);
    return e;
  }

  function createSphereGradient(nodeId, color) {
    const gradient = el("radialGradient", { id: `sphere-${nodeId}`, cx: "35%", cy: "35%" });
    gradient.appendChild(el("stop", { offset: "0%", "stop-color": color, "stop-opacity": "1" }));
    gradient.appendChild(el("stop", { offset: "70%", "stop-color": color, "stop-opacity": "0.9" }));
    gradient.appendChild(el("stop", { offset: "100%", "stop-color": color, "stop-opacity": "0.6" }));
    gradientsDef.appendChild(gradient);
  }

  // ─── Drawing Web Threads ───
  function drawWebStructure() {
    topics.center.children.forEach(childId => {
      const p1 = topics.center, p2 = topics[childId];
      drawSilkSpoke(p1.x, p1.y, p2.x, p2.y, p2.color, "1.5", "0.4");
    });

    topics.center.children.forEach(mainId => {
      const pMain = topics[mainId];
      if (pMain.children) {
        pMain.children.forEach(subId => {
          const pSub = topics[subId];
          if (pSub) drawSilkSpoke(pMain.x, pMain.y, pSub.x, pSub.y, pSub.color, "1.2", "0.35");
        });
      }
    });

    const mainNodes = topics.center.children;
    for (let i = 0; i < mainNodes.length; i++) {
      const current = topics[mainNodes[i]];
      const next = topics[mainNodes[(i + 1) % mainNodes.length]];
      drawCurvedWebThread(current.x, current.y, next.x, next.y, "#ffffff", "0.18");
    }

    const outerRingSequence = [
      "astronomy", "physics", "chemistry", "biology", "ai_ml", "web_dev", 
      "robotics", "biotech", "ancient", "medieval", "modern", "algebra", 
      "calculus", "statistics", "music", "visual_art", "literature", "film"
    ];
    for (let i = 0; i < outerRingSequence.length; i++) {
      const current = topics[outerRingSequence[i]];
      const next = topics[outerRingSequence[(i + 1) % outerRingSequence.length]];
      if (current && next) {
        drawCurvedWebThread(current.x, current.y, next.x, next.y, "#ffffff", "0.12");
      }
    }
  }

  function drawSilkSpoke(x1, y1, x2, y2, color, width, opacity) {
    threadLayer.appendChild(el("line", {
      x1, y1, x2, y2,
      stroke: color, "stroke-width": width, "stroke-opacity": opacity,
      "stroke-dasharray": "4 3"
    }));
  }

  function drawCurvedWebThread(x1, y1, x2, y2, color, opacity) {
    const midX = (x1 + x2) / 2;
    const midY = (y1 + y2) / 2;
    const dx = 340 - midX;
    const dy = 240 - midY;
    const sag = 0.15; 
    const cpx = midX + dx * sag;
    const cpy = midY + dy * sag;

    threadLayer.appendChild(el("path", {
      class: "web-thread",
      d: `M ${x1} ${y1} Q ${cpx} ${cpy} ${x2} ${y2}`,
      fill: "none", stroke: color, "stroke-width": "1", "stroke-opacity": opacity
    }));
  }

  // ─── Drawing Nodes ───
  function drawNodes() {
    for (const node of Object.values(topics)) {
      createSphereGradient(node.id, node.color);

      const g = el("g", {
        class: "node-group", role: "button", tabindex: "0",
        "aria-label": `Learn about ${node.label}`, "data-node-id": node.id,
        style: `--glow: ${node.color};`
      });

      g.appendChild(el("circle", {
        class: "pulse", cx: node.x, cy: node.y, r: node.r + 10,
        fill: node.color, opacity: "0.12"
      }));

      g.appendChild(el("circle", {
        class: "body", cx: node.x, cy: node.y, r: node.r,
        fill: `url(#sphere-${node.id})`, style: `--r: ${node.r}px;`
      }));

      g.appendChild(el("ellipse", {
        class: "shine", cx: node.x - node.r * 0.3, cy: node.y - node.r * 0.3,
        rx: node.r * 0.4, ry: node.r * 0.5,
        fill: "white", opacity: "0.25"
      }));

      const words = node.label.split(" ");
      const lineH = 14;
      const startY = node.y - ((words.length - 1) * lineH) / 2;

      words.forEach((word, idx) => {
        const text = el("text", {
          x: node.x, y: startY + idx * lineH,
          "text-anchor": "middle", "dominant-baseline": "central",
          fill: node.textColor, "font-family": "inherit",
          "font-size": node.id === "center" ? "14" : (node.children ? "12" : "10"),
          "font-weight": "500", "pointer-events": "none",
          "text-shadow": "0 1px 4px rgba(0,0,0,0.9)"
        });
        text.textContent = word;
        g.appendChild(text);
      });

      const open = () => { zoomToNode(node); showPanel(node); };
      g.addEventListener("click", open);
      g.addEventListener("keydown", e => { if (e.key === "Enter" || e.key === " ") { e.preventDefault(); open(); } });

      nodeLayer.appendChild(g);
    }
  }

  // ─── Viewport Matrix Engine (Pan & Dynamic Scroll Zoom) ───
  const canvas = document.getElementById("canvas");

  function applyViewportTransform() {
    svg.style.transform = `translate(${currentTranslate.x}px, ${currentTranslate.y}px) scale(${scale})`;
  }

  // Mouse Wheel / Trackpad Scroll Zoom Event Pipeline
  canvas.addEventListener("wheel", e => {
    e.preventDefault(); // Stop standard browser body overflow scroll logic

    const zoomIntensity = 0.05;
    const rect = canvas.getBoundingClientRect();
    
    // Track cursor location relative to internal canvas layout context coordinates
    const mouseX = e.clientX - rect.left;
    const mouseY = e.clientY - rect.top;

    // Calculate layout anchor data points prior to transformation adjustments
    const graphX = (mouseX - currentTranslate.x) / scale;
    const graphY = (mouseY - currentTranslate.y) / scale;

    // Process wheel trajectory boundaries
    if (e.deltaY < 0) {
      scale = Math.min(scale + zoomIntensity, 4.5); // Max Zoom ceiling bounds cap
    } else {
      scale = Math.max(scale - zoomIntensity, 0.6); // Min Zoom floor bounds cap
    }

    // Readjust translation vectors to lock zoom center direct to cursor focus profile
    currentTranslate.x = mouseX - graphX * scale;
    currentTranslate.y = mouseY - graphY * scale;

    svg.style.transition = "none"; // Instant layout updates for scroll precision
    applyViewportTransform();
  }, { passive: false });

  // Panning Event Controls
  svg.addEventListener("mousedown", e => {
    if (e.target.closest(".node-group")) return;
    isDragging = true;
    dragStartX = e.clientX - currentTranslate.x;
    dragStartY = e.clientY - currentTranslate.y;
    canvas.classList.add("dragging");
    svg.style.transition = "none";
  });

  document.addEventListener("mousemove", e => {
    if (!isDragging) return;
    currentTranslate.x = e.clientX - dragStartX;
    currentTranslate.y = e.clientY - dragStartY;
    applyViewportTransform();
  });

  document.addEventListener("mouseup", () => { 
    isDragging = false; 
    canvas.classList.remove("dragging");
  });

  // Mobile Touch Translation mapping
  let touchStartX = 0, touchStartY = 0;
  svg.addEventListener("touchstart", e => {
    if (e.target.closest(".node-group") || e.touches.length > 1) return;
    touchStartX = e.changedTouches[0].clientX - currentTranslate.x;
    touchStartY = e.changedTouches[0].clientY - currentTranslate.y;
    isDragging = true;
    svg.style.transition = "none";
  });
  svg.addEventListener("touchmove", e => {
    if (!isDragging) return;
    currentTranslate.x = e.changedTouches[0].clientX - touchStartX;
    currentTranslate.y = e.changedTouches[0].clientY - touchStartY;
    applyViewportTransform();
  });
  svg.addEventListener("touchend", () => { isDragging = false; });

  // ─── UI Node Focus Animations ───
  function zoomToNode(node) {
    if (isAnimating) return;
    isAnimating = true;

    scale = node.id === "center" ? 1.5 : 2.5;
    // Anchor center translation target coordinates directly onto canvas midpoint geometry
    currentTranslate.x = 340 - (node.x * scale);
    currentTranslate.y = 240 - (node.y * scale);

    svg.style.transition = "transform 0.6s cubic-bezier(0.34, 1.56, 0.64, 1)";
    applyViewportTransform();

    setTimeout(() => { isAnimating = false; }, 600);
  }

  function resetZoom() {
    if (isAnimating) return;
    isAnimating = true;

    // Reset fallback back into default 2.0 parameters
    scale = 2.0;
    currentTranslate = { x: -340, y: -240 };
    svg.style.transition = "transform 0.6s cubic-bezier(0.34, 1.56, 0.64, 1)";
    applyViewportTransform();

    setTimeout(() => { isAnimating = false; }, 600);
  }

  // ─── Panel HUD Processing ───
  function showPanel(node) {
    panelHistory.push(node);
    document.getElementById("panel-title").textContent = node.label;
    document.getElementById("panel-desc").textContent = node.desc;

    const breadcrumb = document.getElementById("panel-breadcrumb");
    const breadcrumbCurrent = document.getElementById("breadcrumb-current");
    const breadcrumbBack = document.getElementById("breadcrumb-back");

    if (panelHistory.length > 1) {
      breadcrumb.style.display = "flex";
      breadcrumbCurrent.textContent = node.label;
      breadcrumbBack.onclick = () => goBack();
    } else {
      breadcrumb.style.display = "none";
    }

    const subsEl = document.getElementById("panel-subs");
    subsEl.innerHTML = "";

    (node.subs || []).forEach(subtext => {
      const btn = document.createElement("button");
      btn.className = "sub-btn";
      btn.textContent = "📍 " + subtext;
      btn.onclick = () => alert(`Exploring subtopic resource: ${subtext}`);
      subsEl.appendChild(btn);
    });

    (node.children || []).forEach(cid => {
      const child = topics[cid];
      if (child) {
        const btn = document.createElement("button");
        btn.className = "sub-btn";
        btn.style.borderColor = child.color;
        btn.textContent = "🕸️ " + child.label;
        btn.onclick = () => { zoomToNode(child); showPanel(child); };
        subsEl.appendChild(btn);
      }
    });

    if (!node.children && node.parentId) {
      const parentNode = topics[node.parentId];
      const btn = document.createElement("button");
      btn.className = "sub-btn";
      btn.textContent = "↑ Return up to " + parentNode.label;
      btn.onclick = () => { zoomToNode(parentNode); showPanel(parentNode); };
      subsEl.appendChild(btn);
    }

    document.getElementById("panel").classList.add("open");
    document.body.setAttribute("aria-hidden", "true");
  }

  function goBack() {
    panelHistory.pop(); 
    if (panelHistory.length > 0) {
      const prevNode = panelHistory.pop();
      zoomToNode(prevNode);
      showPanel(prevNode);
    } else {
      closePanel();
    }
  }

  function closePanel() {
    document.getElementById("panel").classList.remove("open");
    document.body.removeAttribute("aria-hidden");
    panelHistory = [];
    resetZoom();
  }

  document.getElementById("panel-close").addEventListener("click", closePanel);
  document.addEventListener("keydown", e => { if (e.key === "Escape") closePanel(); });

  // ─── Initialization Initialization Run Sequence ───
  drawWebStructure();
  drawNodes();
  applyViewportTransform();
</script>
</body>
</html>
