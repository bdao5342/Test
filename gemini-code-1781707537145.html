<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Knowledge Node Explorer</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #000411; /* Slightly darker backing for better web contrast */
      color: #e4e4e8;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 16px;
      position: relative;
      overflow: hidden;
    }

    /* Space background with stars */
    body::before {
      content: "";
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: 
        radial-gradient(2px 2px at 20px 30px, #eee, rgba(0,0,0,0)),
        radial-gradient(2px 2px at 60px 70px, #fff, rgba(0,0,0,0)),
        radial-gradient(1px 1px at 50px 50px, #ddd, rgba(0,0,0,0)),
        radial-gradient(1px 1px at 130px 80px, #fff, rgba(0,0,0,0)),
        radial-gradient(2px 2px at 90px 10px, #eee, rgba(0,0,0,0));
      background-repeat: repeat;
      background-size: 200px 200px;
      background-color: #000411;
      animation: twinkle 3s ease-in-out infinite;
      pointer-events: none;
      z-index: 0;
    }

    /* Nebula effect */
    body::after {
      content: "";
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: 
        radial-gradient(ellipse at 20% 50%, rgba(99, 102, 241, 0.08) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 80%, rgba(168, 85, 247, 0.08) 0%, transparent 50%),
        radial-gradient(ellipse at 50% 0%, rgba(59, 130, 246, 0.05) 0%, transparent 50%);
      pointer-events: none;
      z-index: 0;
    }

    @keyframes twinkle {
      0%, 100% { opacity: 0.3; }
      50% { opacity: 1; }
    }

    header {
      padding: 28px 24px 4px;
      text-align: center;
      position: relative;
      z-index: 10;
    }

    header h1 {
      font-size: clamp(20px, 5vw, 28px);
      font-weight: 500;
      letter-spacing: -0.3px;
      color: #f0f0f4;
      text-shadow: 0 0 20px rgba(99, 102, 241, 0.5);
    }

    header p {
      font-size: 13px;
      color: #888;
      margin-top: 4px;
    }

    #canvas {
      position: relative;
      width: 100%;
      max-width: 720px;
      aspect-ratio: 680 / 480;
      margin: 12px 0;
      cursor: grab;
      user-select: none;
      z-index: 5;
    }

    #canvas.dragging {
      cursor: grabbing;
    }

    svg#graph {
      width: 100%;
      height: 100%;
      transition: transform 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    /* ─── Node Styles ─── */
    .node-group {
      cursor: pointer;
      transition: filter 0.2s ease;
    }

    .node-group:focus {
      outline: none;
      filter: drop-shadow(0 0 12px rgba(127, 119, 221, 0.6));
    }

    .node-group:focus-visible {
      filter: drop-shadow(0 0 12px rgba(127, 119, 221, 0.8));
    }

    .node-group circle.pulse {
      transition: r 0.3s ease, opacity 0.3s ease;
    }

    .node-group circle.body {
      transition: r 0.2s ease, filter 0.2s ease;
    }

    .node-group ellipse.shine {
      transition: opacity 0.2s ease;
    }

    .node-group:hover circle.body,
    .node-group:focus circle.body {
      r: calc(var(--r) + 3px);
      filter: brightness(1.2) drop-shadow(0 0 8px var(--glow));
    }

    .node-group:hover circle.pulse,
    .node-group:focus circle.pulse {
      r: calc(var(--r) + 10px);
      opacity: 0.3;
    }

    /* Web Thread animations/hovers */
    .web-thread {
      transition: stroke-opacity 0.3s ease, stroke-width 0.3s ease;
    }
    .node-group:hover ~ .web-thread {
      stroke-opacity: 0.4;
    }

    /* ─── Panel Styles ─── */
    #panel {
      position: absolute;
      bottom: 12px;
      left: 50%;
      transform: translateX(-50%);
      width: 92%;
      max-width: 560px;
      background: rgba(15, 15, 25, 0.95);
      backdrop-filter: blur(10px);
      border: 0.5px solid #333355;
      border-radius: 14px;
      padding: 18px 22px 16px;
      opacity: 0;
      visibility: hidden;
      transform: translateX(-50%) translateY(20px);
      transition: opacity 0.3s ease, visibility 0.3s ease, transform 0.3s ease;
      max-height: 60vh;
      overflow-y: auto;
      box-shadow: 0 8px 32px rgba(99, 102, 241, 0.2);
    }

    #panel.open {
      opacity: 1;
      visibility: visible;
      transform: translateX(-50%) translateY(0);
    }

    #panel h3 {
      font-size: 15px;
      font-weight: 500;
      color: #f0f0f4;
      margin-bottom: 6px;
    }

    #panel p {
      font-size: 13px;
      color: #999;
      line-height: 1.65;
    }

    #panel-close {
      position: absolute;
      top: 12px;
      right: 16px;
      cursor: pointer;
      font-size: 20px;
      color: #666;
      background: none;
      border: none;
      line-height: 1;
      font-family: inherit;
      padding: 6px 8px;
      transition: color 0.2s ease, background 0.2s ease, border-radius 0.2s ease;
      border-radius: 4px;
    }

    #panel-close:hover,
    #panel-close:focus {
      color: #ddd;
      background: rgba(255, 255, 255, 0.1);
    }

    .panel-breadcrumb {
      font-size: 11px;
      color: #666;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .panel-breadcrumb button {
      background: none;
      border: none;
      color: #7F77DD;
      cursor: pointer;
      text-decoration: underline;
      font-size: 11px;
      padding: 2px 4px;
    }

    .subnodes {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 12px;
    }

    .sub-btn {
      font-size: 12px;
      padding: 6px 12px;
      border-radius: 99px;
      border: 0.5px solid #333;
      background: #1a1a2e;
      color: #aaa;
      cursor: pointer;
      font-family: inherit;
      transition: background 0.15s, color 0.15s, border-color 0.15s;
    }

    .sub-btn:hover {
      background: #2a2a3e;
      color: #ddd;
      border-color: #555;
    }

    #hint {
      font-size: 12px;
      color: #555;
      text-align: center;
      padding: 12px 0 2px;
      position: relative;
      z-index: 10;
    }
  </style>
</head>
<body>

<header>
  <h1>Knowledge Web Explorer</h1>
  <p>Click any node to explore the web • Drag to pan</p>
</header>

<div id="canvas">
  <svg id="graph" viewBox="0 0 680 480" preserveAspectRatio="xMidYMid meet">
    <defs id="gradients"></defs>
    <!-- Groups to enforce correct rendering layering (threads below nodes) -->
    <g id="thread-layer"></g>
    <g id="node-layer"></g>
  </svg>
  <div id="panel" role="dialog" aria-modal="true" aria-labelledby="panel-title">
    <button id="panel-close" aria-label="Close panel">×</button>
    <div class="panel-breadcrumb" id="panel-breadcrumb" style="display: none;">
      <button id="breadcrumb-back">← Back</button>
      <span>/</span>
      <span id="breadcrumb-current"></span>
    </div>
    <h3 id="panel-title"></h3>
    <p id="panel-desc"></p>
    <div class="subnodes" id="panel-subs"></div>
  </div>
</div>

<p id="hint">Click any node to explore • Drag to pan</p>

<script>
  // ─── Re-architected Topic Data to explicitly map out a spider web layout ───
  const topics = {
    center: {
      id: "center", label: "Knowledge",
      x: 340, y: 240, r: 42,
      color: "#7F77DD", textColor: "#fff",
      desc: "The central hub of human exploration. Branches extend outwards like structural silk threads.",
      children: ["science", "tech", "history", "math", "arts"]
    },
    // Main tier 1 nodes (Spokes)
    science: {
      id: "science", label: "Science",
      x: 170, y: 120, r: 28, color: "#1D9E75", textColor: "#fff",
      desc: "Systematic analysis of empirical phenomena spanning natural laws and processes.",
      children: ["physics", "chemistry", "biology", "astronomy"]
    },
    tech: {
      id: "tech", label: "Technology",
      x: 510, y: 120, r: 28, color: "#378ADD", textColor: "#fff",
      desc: "Practical application of knowledge through computational tools, architecture, and engineering.",
      children: ["ai_ml", "web_dev", "robotics", "biotech"]
    },
    history: {
      id: "history", label: "History",
      x: 560, y: 340, r: 28, color: "#BA7517", textColor: "#fff",
      desc: "Chronological exploration of human civilizations, historical inflection points, and social movements.",
      children: ["ancient", "medieval", "modern", "world_wars"]
    },
    math: {
      id: "math", label: "Math",
      x: 340, y: 430, r: 28, color: "#993556", textColor: "#fff",
      desc: "The foundational abstract structures, patterns, calculations, and pure logical models.",
      children: ["algebra", "calculus", "statistics", "geometry"]
    },
    arts: {
      id: "arts", label: "Arts",
      x: 120, y: 340, r: 28, color: "#D4537E", textColor: "#fff",
      desc: "Human creative expression manifested through visual forms, sounds, performance, and narrative.",
      children: ["music", "visual_art", "literature", "film"]
    },

    // Tier 2 outer subnodes (The Outer Web Ring elements)
    physics: { id: "physics", label: "Physics", x: 90, y: 60, r: 18, color: "#167A5B", textColor: "#ccc", desc: "Matter, energy, and spacetime mechanics.", parentId: "science" },
    chemistry: { id: "chemistry", label: "Chemistry", x: 190, y: 30, r: 18, color: "#167A5B", textColor: "#ccc", desc: "Atomic interactions and molecular constructs.", parentId: "science" },
    biology: { id: "biology", label: "Biology", x: 260, y: 50, r: 18, color: "#167A5B", textColor: "#ccc", desc: "Organic systems and physiological evolution.", parentId: "science" },
    astronomy: { id: "astronomy", label: "Astronomy", x: 110, y: 180, r: 18, color: "#167A5B", textColor: "#ccc", desc: "Celestial bodies and deep cosmos observation.", parentId: "science" },

    ai_ml: { id: "ai_ml", label: "AI & ML", x: 420, y: 50, r: 18, color: "#2B6CAE", textColor: "#ccc", desc: "Algorithmic intelligence, neural architectures.", parentId: "tech" },
    web_dev: { id: "web_dev", label: "Web Dev", x: 490, y: 30, r: 18, color: "#2B6CAE", textColor: "#ccc", desc: "Global information network architectures.", parentId: "tech" },
    robotics: { id: "robotics", label: "Robotics", x: 590, y: 60, r: 18, color: "#2B6CAE", textColor: "#ccc", desc: "Autonomous kinetic mechanical systems.", parentId: "tech" },
    biotech: { id: "biotech", label: "Biotech", x: 570, y: 180, r: 18, color: "#2B6CAE", textColor: "#ccc", desc: "Synthesis of live systems with modern tech.", parentId: "tech" },

    ancient: { id: "ancient", label: "Ancient", x: 620, y: 260, r: 18, color: "#996013", textColor: "#ccc", desc: "Early civilizations, mythology, origins.", parentId: "history" },
    medieval: { id: "medieval", label: "Medieval", x: 630, y: 380, r: 18, color: "#996013", textColor: "#ccc", desc: "Feudal eras, kingdoms, and societal structures.", parentId: "history" },
    modern: { id: "modern", label: "Modern", x: 530, y: 440, r: 18, color: "#996013", textColor: "#ccc", desc: "Industrial revolution to digital transformation.", parentId: "history" },
    world_wars: { id: "world_wars", label: "World Wars", x: 460, y: 390, r: 18, color: "#996013", textColor: "#ccc", desc: "Global geopolitical conflicts of the 20th century.", parentId: "history" },

    algebra: { id: "algebra", label: "Algebra", x: 410, y: 460, r: 18, color: "#7F2C47", textColor: "#ccc", desc: "Mathematical symbols and rules equations operations.", parentId: "math" },
    calculus: { id: "calculus", label: "Calculus", x: 340, y: 475, r: 18, color: "#7F2C47", textColor: "#ccc", desc: "Mathematical study of continuous change.", parentId: "math" },
    statistics: { id: "statistics", label: "Statistics", x: 270, y: 460, r: 18, color: "#7F2C47", textColor: "#ccc", desc: "Data collection, analytical probabilities, distribution patterns.", parentId: "math" },
    geometry: { id: "geometry", label: "Geometry", x: 340, y: 365, r: 18, color: "#7F2C47", textColor: "#ccc", desc: "Properties, lines, vectors, shapes, and spatial dynamics.", parentId: "math" },

    music: { id: "music", label: "Music", x: 220, y: 390, r: 18, color: "#B04467", textColor: "#ccc", desc: "Acoustic structures, compositions, and rhythms.", parentId: "arts" },
    visual_art: { id: "visual_art", label: "Visual Art", x: 150, y: 440, r: 18, color: "#B04467", textColor: "#ccc", desc: "Illustrative mediums, painting, sculpting.", parentId: "arts" },
    literature: { id: "literature", label: "Literature", x: 50, y: 380, r: 18, color: "#B04467", textColor: "#ccc", desc: "Textual world-building, prose, drama, poetry.", parentId: "arts" },
    film: { id: "film", label: "Film", x: 60, y: 260, r: 18, color: "#B04467", textColor: "#ccc", desc: "Cinematic narratives, pacing, moving picture arts.", parentId: "arts" }
  };

  const svg = document.getElementById("graph");
  const threadLayer = document.getElementById("thread-layer");
  const nodeLayer = document.getElementById("node-layer");
  const gradientsDef = document.getElementById("gradients");
  const NS = "http://www.w3.org/2000/svg";

  function el(tag, attrs) {
    const e = document.createElementNS(NS, tag);
    for (const [k, v] of Object.entries(attrs)) e.setAttribute(k, v);
    return e;
  }

  function createSphereGradient(nodeId, color) {
    const gradient = el("radialGradient", { id: `sphere-${nodeId}`, cx: "35%", cy: "35%" });
    gradient.appendChild(el("stop", { offset: "0%", "stop-color": "#ffffff", "stop-opacity": "0.4" }));
    gradient.appendChild(el("stop", { offset: "40%", "stop-color": color, "stop-opacity": "1" }));
    gradient.appendChild(el("stop", { offset: "100%", "stop-color": color, "stop-opacity": "0.6" }));
    gradientsDef.appendChild(gradient);
  }

  // ─── Drawing Threads (The Web Structure) ───────────────────────────────────
  function drawWebGraph() {
    // 1. Draw Core Spokes (Hub to Main Nodes)
    topics.center.children.forEach(childId => {
      const p1 = topics.center, p2 = topics[childId];
      drawSilkLine(p1.x, p1.y, p2.x, p2.y, p2.color, "2", "0.4");
    });

    // 2. Draw Branch Spokes (Main Nodes to Subnodes)
    const mainNodes = topics.center.children;
    mainNodes.forEach(mainId => {
      const pMain = topics[mainId];
      if (pMain.children) {
        pMain.children.forEach(subId => {
          const pSub = topics[subId];
          drawSilkLine(pMain.x, pMain.y, pSub.x, pSub.y, pSub.color, "1.2", "0.3");
        });
      }
    });

    // 3. Draw Concentric Ring Threads (Connecting adjacent Main nodes like an inner web layer)
    for (let i = 0; i < mainNodes.length; i++) {
      const current = topics[mainNodes[i]];
      const next = topics[mainNodes[(i + 1) % mainNodes.length]];
      drawCurvedWebThread(current.x, current.y, next.x, next.y, "#ffffff", "0.18");
    }

    // 4. Draw Outer Ring Threads (Connecting the peripheral subnodes into outer web bounds)
    const outerRingSequence = [
      "astronomy", "physics", "chemistry", "biology", "ai_ml", "web_dev", 
      "robotics", "biotech", "ancient", "medieval", "modern", "algebra", 
      "calculus", "statistics", "music", "visual_art", "literature", "film"
    ];

    for (let i = 0; i < outerRingSequence.length; i++) {
      const current = topics[outerRingSequence[i]];
      const next = topics[outerRingSequence[(i + 1) % outerRingSequence.length]];
      if (current && next) {
        drawCurvedWebThread(current.x, current.y, next.x, next.y, "#ffffff", "0.12");
      }
    }
  }

  function drawSilkLine(x1, y1, x2, y2, color, width, opacity) {
    threadLayer.appendChild(el("line", {
      x1, y1, x2, y2,
      stroke: color, "stroke-width": width, "stroke-opacity": opacity,
      "stroke-dasharray": "2 2"
    }));
  }

  // Gives the web thread a natural, organic look by bowing inward slightly towards the center (340, 240)
  function drawCurvedWebThread(x1, y1, x2, y2, color, opacity) {
    const midX = (x1 + x2) / 2;
    const midY = (y1 + y2) / 2;
    
    // Vector pushing inward toward the center hub
    const dx = 340 - midX;
    const dy = 240 - midY;
    
    // Sag intensity factor
    const sag = 0.15; 
    const cpx = midX + dx * sag;
    const cpy = midY + dy * sag;

    threadLayer.appendChild(el("path", {
      class: "web-thread",
      d: `M ${x1} ${y1} Q ${cpx} ${cpy} ${x2} ${y2}`,
      fill: "none", stroke: color, "stroke-width": "1", "stroke-opacity": opacity
    }));
  }

  // ─── Drawing Nodes ─────────────────────────────────────────────────────────
  function drawNodes() {
    for (const node of Object.values(topics)) {
      createSphereGradient(node.id, node.color);

      const g = el("g", {
        class: "node-group", role: "button", tabindex: "0",
        "aria-label": `Explore ${node.label}`, "data-node-id": node.id,
        style: `--glow: ${node.color};`
      });

      g.appendChild(el("circle", {
        class: "pulse", cx: node.x, cy: node.y, r: node.r + 6,
        fill: node.color, opacity: "0.08"
      }));

      g.appendChild(el("circle", {
        class: "body", cx: node.x, cy: node.y, r: node.r,
        fill: `url(#sphere-${node.id})`, style: `--r: ${node.r}px;`
      }));

      // Font size scales with depth
      let fSize = "13";
      if (node.id === "center") fSize = "14";
      if (!node.children && node.id !== "center") fSize = "10";

      const t = el("text", {
        x: node.x, y: node.y, "text-anchor": "middle", "dominant-baseline": "central",
        fill: node.textColor, "font-family": "inherit", "font-size": fSize,
        "font-weight": "500", "pointer-events": "none",
        "text-shadow": "0 1px 4px rgba(0,0,0,0.8)"
      });
      t.textContent = node.label;

      const open = () => { zoomToNode(node); showPanel(node); };
      g.addEventListener("click", open);
      g.addEventListener("keydown", e => { if (e.key === "Enter" || e.key === " ") { e.preventDefault(); open(); } });

      g.appendChild(t);
      nodeLayer.appendChild(g);
    }
  }

  // ─── Canvas Interaction Handling (Pan/Zoom) ───────────────────────────────
  let isDragging = false, dragStartX = 0, dragStartY = 0;
  let currentTranslate = { x: 0, y: 0 };
  const canvas = document.getElementById("canvas");

  svg.addEventListener("mousedown", e => {
    if (e.target.closest(".node-group")) return;
    isDragging = true;
    dragStartX = e.clientX - currentTranslate.x;
    dragStartY = e.clientY - currentTranslate.y;
    canvas.classList.add("dragging");
  });

  document.addEventListener("mousemove", e => {
    if (!isDragging) return;
    currentTranslate.x = e.clientX - dragStartX;
    currentTranslate.y = e.clientY - dragStartY;
    svg.style.transform = `translate(${currentTranslate.x}px, ${currentTranslate.y}px)`;
  });

  document.addEventListener("mouseup", () => { isDragging = false; canvas.classList.remove("dragging"); });

  // Mobile support
  let touchStartX = 0, touchStartY = 0;
  svg.addEventListener("touchstart", e => {
    if (e.target.closest(".node-group")) return;
    touchStartX = e.changedTouches[0].clientX - currentTranslate.x;
    touchStartY = e.changedTouches[0].clientY - currentTranslate.y;
    isDragging = true;
  });
  svg.addEventListener("touchmove", e => {
    if (!isDragging) return;
    currentTranslate.x = e.changedTouches[0].clientX - touchStartX;
    currentTranslate.y = e.changedTouches[0].clientY - touchStartY;
    svg.style.transform = `translate(${currentTranslate.x}px, ${currentTranslate.y}px)`;
  });
  svg.addEventListener("touchend", () => { isDragging = false; });

  let isAnimating = false;
  function zoomToNode(node) {
    if (isAnimating) return;
    isAnimating = true;

    const zoomScale = node.id === "center" ? 1.2 : 2.0;
    svg.style.transformOrigin = `${node.x}px ${node.y}px`;
    svg.style.transform = `scale(${zoomScale}) translate(${(340 - node.x)}px, ${(240 - node.y)}px)`;

    setTimeout(() => { isAnimating = false; }, 600);
  }

  function resetZoom() {
    if (isAnimating) return;
    isAnimating = true;
    svg.style.transform = `translate(${currentTranslate.x}px, ${currentTranslate.y}px)`;
    setTimeout(() => { isAnimating = false; }, 600);
  }

  // ─── Panel HUD Processing ──────────────────────────────────────────────────
  let panelHistory = [];
  function showPanel(node) {
    panelHistory.push(node);
    document.getElementById("panel-title").textContent = node.label;
    document.getElementById("panel-desc").textContent = node.desc;

    const breadcrumb = document.getElementById("panel-breadcrumb");
    const breadcrumbCurrent = document.getElementById("breadcrumb-current");
    const breadcrumbBack = document.getElementById("breadcrumb-back");

    if (panelHistory.length > 1) {
      breadcrumb.style.display = "flex";
      breadcrumbCurrent.textContent = node.label;
      breadcrumbBack.onclick = () => goBack();
    } else {
      breadcrumb.style.display = "none";
    }

    const subsEl = document.getElementById("panel-subs");
    subsEl.innerHTML = "";

    // If it has children data loops, parse cross-links
    (node.children || []).forEach(cid => {
      const child = topics[cid];
      const btn = document.createElement("button");
      btn.className = "sub-btn";
      btn.style.borderColor = child.color;
      btn.textContent = "🕸️ " + child.label;
      btn.onclick = () => { zoomToNode(child); showPanel(child); };
      subsEl.appendChild(btn);
    });

    // If it's a leaf node, show its sibling group or root connection
    if (!node.children && node.parentId) {
      const parentNode = topics[node.parentId];
      const btn = document.createElement("button");
      btn.className = "sub-btn";
      btn.textContent = "↑ Up to " + parentNode.label;
      btn.onclick = () => { zoomToNode(parentNode); showPanel(parentNode); };
      subsEl.appendChild(btn);
    }

    document.getElementById("panel").classList.add("open");
  }

  function goBack() {
    panelHistory.pop(); 
    if (panelHistory.length > 0) {
      const prevNode = panelHistory.pop();
      zoomToNode(prevNode);
      showPanel(prevNode);
    } else {
      closePanel();
    }
  }

  function closePanel() {
    document.getElementById("panel").classList.remove("open");
    panelHistory = [];
    resetZoom();
  }

  document.getElementById("panel-close").addEventListener("click", closePanel);
  document.addEventListener("keydown", e => { if (e.key === "Escape") closePanel(); });

  // ─── Kickoff ───
  drawWebGraph();
  drawNodes();
</script>
</body>
</html>
